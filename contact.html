<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 株式会社河内興業</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">株式会社河内興業</a>
        <nav><ul>
            <li><a href="services.html" class="nav-btn">事業・技術</a></li>
            <li><a href="projects.html" class="nav-btn">施工実績</a></li>
            <li><a href="greeting.html" class="nav-btn">代表挨拶</a></li>
            <li><a href="contact.html" class="nav-btn">お問い合わせ</a></li>
        </ul></nav>
    </header>

    <section style="max-width: 800px; margin: 0 auto; text-align: center;">
        <h2 class="section-title">お問い合わせ<span>CONTACT</span></h2>
        <p>工事に関するご相談、お見積りのご依頼など、お気軽にお問い合わせください。</p>
        
        <form style="margin-top: 40px;">
            <div class="form-group">
                <label>会社名・お名前</label>
                <input type="text" placeholder="例：株式会社河内 太郎">
            </div>
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>電話番号</label>
                <input type="tel" placeholder="090-0000-0000">
            </div>
            <div class="form-group">
                <label>お問い合わせ内容</label>
                <textarea rows="6" placeholder="ご相談内容をご記入ください"></textarea>
            </div>
            <button type="submit" class="btn-wa" style="cursor: pointer;">この内容で送信する</button>
        </form>
    </section>

    <footer><p>株式会社河内興業 | 090-5927-1930</p></footer>
</body>
</html>
