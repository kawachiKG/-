    <link rel="stylesheet" href="style.css">
    <style>
        .slideshow { position: relative; width: 100%; height: 80vh; overflow: hidden; background: #222; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; animation: fade 30s infinite; background-size: cover; background-position: center; }
        
        /* スライド画像設定 */
        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1200'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1200'); animation-delay: 5s; }
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1581094288338-2314dddb7ecc?q=80&w=1200'); animation-delay: 10s; }
        .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1590579491624-f98f36d4c763?q=80&w=1200'); animation-delay: 15s; }
        .slide:nth-child(5) { background-image: url('https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80&w=1200'); animation-delay: 20s; }
        .slide:nth-child(6) { background-image: url('https://images.unsplash.com/photo-1531834685032-c34bf0d84c77?q=80&w=1200'); animation-delay: 25s; }

        /* 画像が常に表示されるよう暗転時間を短縮 */
        @keyframes fade {
            0% { opacity: 0; transform: scale(1.1); }
            5% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* キャッチコピーの配置とアニメーション */
        .hero { 
            position: absolute; top: 45%; left: 10%; transform: translateY(-50%); 
            color: #fff; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); z-index: 10;
        }
        .hero h1 { 
            font-size: 3.2rem; writing-mode: vertical-rl; letter-spacing: 0.5em; line-height: 1.6;
            animation: textFloatUp 5s infinite; /* 画像切り替えに合わせて5秒周期 */
        }
        
        @keyframes textFloatUp {
            0% { opacity: 0; transform: translateY(30px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .hero { left: 5%; top: 40%; }
        }
    </style>
</head>
