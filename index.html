<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社河内興業 | TOP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .slideshow { position: relative; width: 100%; height: 85vh; overflow: hidden; background: #222; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; animation: fade 15s infinite; background-size: cover; background-position: center; }
        
        /* スライド画像設定（提供いただいた写真に変更） */
        .slide:nth-child(1) { background-image: url('site1.png'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('site2.png'); animation-delay: 5s; }
        .slide:nth-child(3) { background-image: url('site3.png'); animation-delay: 10s; }

        @keyframes fade {
            0% { opacity: 0; transform: scale(1.05); }
            10% { opacity: 1; }
            33% { opacity: 1; }
            43% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* キャッチコピーの配置（位置固定） */
        .hero { 
            position: absolute; top: 50%; left: 10%; transform: translateY(-50%); 
            color: #fff; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); z-index: 10;
        }

        /* 霧の中から浮かび上がるアニメーション */
        .hero h1 { 
            font-size: 3.2rem; writing-mode: vertical-rl; letter-spacing: 0.5em; line-height: 1.6;
            position: absolute; top: 0; left: 0; margin: 0; opacity: 0;
            filter: blur(10px); /* 霧（ぼかし）の演出 */
            animation: mistFade 15s infinite;
        }
        
        /* 3種類のコピーを順番に出す設定 */
        .phrase1 { animation-delay: 0s !important; }
        .phrase2 { animation-delay: 5s !important; }
        .phrase3 { animation-delay: 10s !important; }

        @keyframes mistFade {
            0% { opacity: 0; filter: blur(15px); }
            5% { opacity: 1; filter: blur(0); }
            28% { opacity: 1; filter: blur(0); }
            33% { opacity: 0; filter: blur(15px); }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .hero { left: 8%; top: 45%; }
        }
    </style>
</head>
<body>
    <header>

    </header>
    <div class="slideshow">
        <div class="slide"></div><div class="slide"></div><div class="slide"></div>
        <div class="hero">
            <h1 class="phrase1">次代を創る確かな技</h1>
            <h1 class="phrase2">次代への架け橋となる技術の継承</h1>
            <h1 class="phrase3">江戸川より全国へ拡げる技術の輪</h1>
        </div>
    </div>
    <section style="text-align: center;">

            <p style="border-bottom: 1px solid #eee; padding: 10px 0;">2026.03.18 ホームページを公開いたしました。</p>
            <p style="border-bottom: 1px solid #eee; padding: 10px 0;">2026.03.15 施工写真を更新しました。</p>
        </div>

</body>
