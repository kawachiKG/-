<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施工実績 | 株式会社河内興業</title>
    <link rel="stylesheet" href="style.css">
    <style>
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* 英字タイトルの差別化スタイル */
        .section-title span {
            display: block; 
            font-size: 0.9rem; 
            color: #c5a059;
            letter-spacing: 0.2em;
            margin-top: 5px;
        }

        /* 最上部の余白を1/5ページ分確保 */
        .section-title {
            text-align: center;
            padding-top: 100px;
            margin-bottom: 20vh;
        }

        /* セクション間のタイトルスタイル */
        .row-header {
            text-align: center;
            padding: 60px 20px;
            background: #f9f9f9;
        }
        .row-header h3 {
            font-size: 1.8rem;
            color: var(--primary);
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
        }
        .row-header h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: #c5a059;
        }

        /* 施工実績セクションのレイアウト */
        .content-row {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            height: 80vh; 
            margin-bottom: 10vh;
        }

        .content-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(0px);
            will-change: filter;
        }

        .content-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 画像を暗くして文字を浮かせるオーバーレイ */
        .content-img::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* 文字だけの演出（背景なし） */
        .content-txt {
            position: relative;
            z-index: 3;
            width: 85%;
            max-width: 800px;
            text-align: center;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 1), 0 0 5px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: translateY(50px);
            will-change: opacity, transform;
        }

        .content-txt p {
            color: #fff;
            font-size: 1.2rem;
            line-height: 2;
            font-weight: 500;
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .section-title { margin-bottom: 15vh; }
            .row-header h3 { font-size: 1.3rem; }
            .content-row { height: 70vh; }
            .content-txt p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">株式会社河内興業</a>
        <div class="menu-icon" id="menu-trigger" onclick="toggleMenu()"><span></span></div>
        <nav id="nav-menu">
            <div class="menu-close" onclick="toggleMenu()">× CLOSE</div>
            <ul>
                <li><a href="services.html" class="nav-btn">事業・技術</a></li>
                <li><a href="projects.html" class="nav-btn">施工実績</a></li>
                <li><a href="greeting.html" class="nav-btn">代表挨拶</a></li>
                <li><a href="company.html" class="nav-btn">会社概要</a></li>
                <li><a href="contact.html" class="nav-btn">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="section-title">施工実績<span>PROJECTS</span></h2>
        
        <div class="row-header"><h3>江戸川区内 宅地改良工事</h3></div>
        <div class="content-row">
            <div class="content-img"><img src="image_6.png" alt="宅地改良工事"></div>
            <div class="content-txt">
                <p>複雑な地層を持つ地域での地盤改良工事。周辺建物への影響を考慮し、最新の低振動工法を採用。無事故・無災害で工期内に完了しました。</p>
            </div>
        </div>

        <div class="row-header"><h3>都内 外構・擁壁構築</h3></div>
        <div class="content-row">
            <div class="content-img"><img src="image_7.png" alt="外構工事"></div>
            <div class="content-txt">
                <p>高低差のある土地での擁壁構築。美観と強靭さを両立させた仕上げにより、お客様から高い評価をいただきました。</p>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 株式会社河内興業</p></footer>

    <script>
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
            document.getElementById('menu-trigger').classList.toggle('active');
        }

        /* アニメーション制御（事業内容ページと完全に同一） */
        window.addEventListener('scroll', () => {
            const rows = document.querySelectorAll('.content-row');
            const windowHeight = window.innerHeight;

            rows.forEach(row => {
                const rect = row.getBoundingClientRect();
                const centerOffset = (rect.top + rect.height / 2) / windowHeight;

                const img = row.querySelector('.content-img');
                const txt = row.querySelector('.content-txt');

                // 文章の出現（中央付近で最もくっきりし、その時間を長く確保）
                let txtProgress = 1 - Math.abs(0.5 - centerOffset) * 1.5;
                txtProgress = Math.min(1, Math.max(0, txtProgress));

                txt.style.opacity = txtProgress;
                txt.style.transform = `translateY(${(1 - txtProgress) * 40}px)`;

                // 写真のぼかし（文章が7割以上くっきりしてからぼかしを開始）
                let blurTrigger = (txtProgress - 0.7) / 0.3; 
                blurTrigger = Math.min(1, Math.max(0, blurTrigger));

                const maxBlur = 8; 
                img.style.filter = `blur(${blurTrigger * maxBlur}px)`;
            });
        }, { passive: true });
    </script>
</body>
</html>
